<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">PPO 训练 CartPole 的完整流程</text>

  <g transform="translate(52, 62)">
    <rect width="118" height="66" rx="4" fill="#ffffff" stroke="#334155" stroke-width="1.4"/>
    <text x="59" y="27" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">创建环境</text>
    <text x="59" y="45" text-anchor="middle" font-size="10" fill="#475569">gym.make("CartPole-v1")</text>
  </g>

  <line x1="176" y1="95" x2="206" y2="95" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <g transform="translate(212, 62)">
    <rect width="128" height="66" rx="4" fill="#ffffff" stroke="#334155" stroke-width="1.4"/>
    <text x="64" y="27" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">初始化模型</text>
    <text x="64" y="45" text-anchor="middle" font-size="10" fill="#475569">PPO + MlpPolicy</text>
    <text x="64" y="59" text-anchor="middle" font-size="9" fill="#64748b">两层 × 64 神经元</text>
  </g>

  <line x1="344" y1="95" x2="374" y2="95" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <g transform="translate(380, 62)">
    <rect width="118" height="66" rx="4" fill="#ffffff" stroke="#334155" stroke-width="1.4"/>
    <text x="59" y="27" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">开始训练</text>
    <text x="59" y="45" text-anchor="middle" font-size="10" fill="#475569">model.learn(20000)</text>
  </g>

  <path d="M 498 128 L 498 162 Q 498 170 490 170 L 374 170" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <g transform="translate(180, 158)">
    <rect width="200" height="58" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.4" stroke-dasharray="5,4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">训练循环（重复数千次）</text>
    <text x="100" y="40" text-anchor="middle" font-size="9" fill="#475569">观察状态 → 选择动作 → 获得奖励 → 更新策略</text>
  </g>

  <path d="M 180 187 L 118 187 Q 110 187 110 179 L 110 150 Q 110 142 118 142 L 160 142" fill="none" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <line x1="280" y1="216" x2="280" y2="236" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <g transform="translate(146, 240)">
    <rect width="268" height="42" rx="4" fill="#ffffff" stroke="#334155" stroke-width="1.4"/>
    <text x="134" y="18" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">训练完成，智能体学会平衡</text>
    <text x="134" y="33" text-anchor="middle" font-size="9" fill="#475569">平均奖励 180+，可视化演示中能稳定保持平衡</text>
  </g>

  <text x="111" y="148" text-anchor="middle" font-size="9" fill="#64748b">约 1 秒</text>
  <text x="276" y="148" text-anchor="middle" font-size="9" fill="#64748b">约 1 秒</text>
  <text x="439" y="148" text-anchor="middle" font-size="9" fill="#64748b">约 5–10 秒</text>

  <text x="300" y="296" text-anchor="middle" font-size="9" fill="#64748b">整个流程在个人电脑上通常不到 30 秒即可完成</text>
</svg>
