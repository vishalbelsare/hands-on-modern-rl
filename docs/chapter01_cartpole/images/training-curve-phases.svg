<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="phase1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fecaca" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fecaca" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bbf7d0" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">典型的 CartPole 训练曲线（ep_rew_mean）</text>

  <!-- Chart area -->
  <g transform="translate(70, 50)">
    <!-- Phase backgrounds -->
    <rect x="0" y="0" width="120" height="220" fill="url(#phase1)"/>
    <rect x="120" y="0" width="180" height="220" fill="url(#phase2)"/>
    <rect x="300" y="0" width="200" height="220" fill="url(#phase3)"/>

    <!-- Phase labels at top -->
    <text x="60" y="-5" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Phase 1: 开局低迷</text>
    <text x="210" y="-5" text-anchor="middle" font-size="11" font-weight="600" fill="#ca8a04">Phase 2: 快速爬升</text>
    <text x="400" y="-5" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Phase 3: 趋于稳定</text>

    <!-- Grid lines -->
    <line x1="0" y1="0" x2="500" y2="0" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="44" x2="500" y2="44" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="88" x2="500" y2="88" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="132" x2="500" y2="132" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="176" x2="500" y2="176" stroke="#e2e8f0" stroke-width="0.5"/>
    <line x1="0" y1="220" x2="500" y2="220" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text x="-8" y="224" text-anchor="end" font-size="10" fill="#94a3b8">0</text>
    <text x="-8" y="180" text-anchor="end" font-size="10" fill="#94a3b8">50</text>
    <text x="-8" y="136" text-anchor="end" font-size="10" fill="#94a3b8">100</text>
    <text x="-8" y="92" text-anchor="end" font-size="10" fill="#94a3b8">150</text>
    <text x="-8" y="48" text-anchor="end" font-size="10" fill="#94a3b8">200</text>
    <text x="-8" y="4" text-anchor="end" font-size="10" fill="#94a3b8">250</text>

    <!-- Y-axis title -->
    <text x="-50" y="110" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90, -50, 110)">平均回合奖励</text>

    <!-- X-axis labels -->
    <text x="0" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">0</text>
    <text x="120" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">3000</text>
    <text x="300" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">10000</text>
    <text x="500" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">20000</text>

    <!-- X-axis title -->
    <text x="250" y="256" text-anchor="middle" font-size="11" fill="#64748b">训练步数 (timesteps)</text>

    <!-- Training curve - realistic jagged shape -->
    <polyline
      points="0,200 10,205 20,195 30,208 40,192 50,198 60,188 70,202 80,190 90,196 100,185 110,195 120,188 130,180 140,172 150,185 160,168 170,175 180,160 190,155 200,165 210,148 220,142 230,150 240,135 250,128 260,140 270,120 280,115 290,125 300,108 310,100 320,110 330,95 340,88 350,98 360,85 370,78 380,90 390,72 400,68 410,75 420,62 430,58 440,65 450,55 460,50 470,56 480,48 490,52 500,45"
      fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Smooth trend line -->
    <polyline
      points="0,200 60,195 120,185 180,165 240,135 300,105 360,82 420,65 480,52 500,48"
      fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>

    <!-- Annotations -->
    <!-- Phase 1 annotation -->
    <g>
      <rect x="15" y="148" width="90" height="36" rx="6" fill="white" stroke="#fca5a5" stroke-width="1"/>
      <text x="60" y="163" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="500">随机策略</text>
      <text x="60" y="177" text-anchor="middle" font-size="9" fill="#dc2626">得分 ~20-40</text>
    </g>

    <!-- Phase 2 annotation -->
    <g>
      <rect x="165" y="92" width="90" height="36" rx="6" fill="white" stroke="#fde047" stroke-width="1"/>
      <text x="210" y="107" text-anchor="middle" font-size="9" fill="#ca8a04" font-weight="500">策略快速改进</text>
      <text x="210" y="121" text-anchor="middle" font-size="9" fill="#ca8a04">得分 40→150+</text>
    </g>

    <!-- Phase 3 annotation -->
    <g>
      <rect x="370" y="18" width="100" height="36" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
      <text x="420" y="33" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="500">策略已收敛</text>
      <text x="420" y="47" text-anchor="middle" font-size="9" fill="#16a34a">得分 ~180-200</text>
    </g>

    <!-- Arrow annotations -->
    <path d="M 60,145 L 60,185" fill="none" stroke="#fca5a5" stroke-width="1" marker-end="url(#arrowAnn)"/>
    <path d="M 210,90 L 210,128" fill="none" stroke="#fde047" stroke-width="1"/>
    <path d="M 420,56 L 420,58" fill="none" stroke="#86efac" stroke-width="1"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="220" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="0" y1="220" x2="500" y2="220" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Trend line legend -->
    <g transform="translate(340, 200)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#6366f1" stroke-width="2.5"/>
      <text x="25" y="4" font-size="9" fill="#64748b">实际曲线</text>
      <line x1="80" y1="0" x2="100" y2="0" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
      <text x="105" y="4" font-size="9" fill="#64748b">趋势线</text>
    </g>
  </g>
</svg>
