<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <linearGradient id="cartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="poleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">CartPole 倒立摆环境</text>

  <!-- Ground -->
  <rect x="40" y="240" width="440" height="20" rx="3" fill="url(#groundGrad)" stroke="#9ca3af" stroke-width="1"/>
  <!-- Ground hatching -->
  <line x1="50" y1="255" x2="60" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="70" y1="255" x2="80" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="90" y1="255" x2="100" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="110" y1="255" x2="120" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="130" y1="255" x2="140" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="150" y1="255" x2="160" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="170" y1="255" x2="180" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="190" y1="255" x2="200" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="210" y1="255" x2="220" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="230" y1="255" x2="240" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="250" y1="255" x2="260" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="270" y1="255" x2="280" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="290" y1="255" x2="300" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="310" y1="255" x2="320" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="330" y1="255" x2="340" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="350" y1="255" x2="360" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="370" y1="255" x2="380" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="390" y1="255" x2="400" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="410" y1="255" x2="420" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="430" y1="255" x2="440" y2="265" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="450" y1="255" x2="460" y2="265" stroke="#9ca3af" stroke-width="0.8"/>

  <!-- Track/Rail -->
  <line x1="60" y1="240" x2="460" y2="240" stroke="#6b7280" stroke-width="2.5"/>

  <!-- Cart (小车) -->
  <rect x="210" y="200" width="100" height="40" rx="6" fill="url(#cartGrad)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="260" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="white">Cart 小车</text>

  <!-- Wheels -->
  <circle cx="230" cy="242" r="8" fill="#374151" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="230" cy="242" r="3" fill="#6b7280"/>
  <circle cx="290" cy="242" r="8" fill="#374151" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="290" cy="242" r="3" fill="#6b7280"/>

  <!-- Pivot point -->
  <circle cx="260" cy="200" r="5" fill="#dc2626" stroke="#991b1b" stroke-width="1"/>

  <!-- Pole (杆子) - slightly tilted -->
  <line x1="260" y1="200" x2="280" y2="110" stroke="url(#poleGrad)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Pole top ball -->
  <circle cx="280" cy="108" r="6" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>

  <!-- Angle arc -->
  <path d="M 260 180 A 20 20 0 0 1 266 181" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="272" y="178" font-size="11" fill="#ef4444" font-style="italic">θ</text>

  <!-- Gravity arrow -->
  <line x1="280" y1="115" x2="280" y2="155" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="276,153 280,162 284,153" fill="#6b7280"/>
  <text x="292" y="142" font-size="10" fill="#6b7280">g</text>

  <!-- Action arrows -->
  <line x1="195" y1="220" x2="130" y2="220" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="150" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">← 左推</text>

  <line x1="325" y1="220" x2="390" y2="220" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="370" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">右推 →</text>

  <!-- Observation labels -->
  <rect x="60" y="60" width="140" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">观测空间 (State)</text>
  <text x="75" y="100" font-size="11" fill="#15803d">• 小车位置 x</text>
  <text x="75" y="115" font-size="11" fill="#15803d">• 小车速度 ẋ</text>
  <text x="75" y="130" font-size="11" fill="#15803d">• 杆子角度 θ</text>

  <!-- Reward box -->
  <rect x="340" y="60" width="140" height="55" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="410" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">奖励 (Reward)</text>
  <text x="355" y="100" font-size="11" fill="#a16207">每保持 +1 步 = +1</text>

  <!-- Goal box -->
  <rect x="340" y="125" width="140" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="410" y="147" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">目标 (Goal)</text>
  <text x="355" y="165" font-size="11" fill="#b91c1c">保持杆子不倒！</text>

  <!-- Connecting lines -->
  <path d="M 200 100 Q 200 150 220 200" fill="none" stroke="#86efac" stroke-width="1.2" stroke-dasharray="4,3"/>
  <path d="M 340 85 Q 310 85 310 200" fill="none" stroke="#fcd34d" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Bottom note -->
  <text x="260" y="300" text-anchor="middle" font-size="11" fill="#64748b">动作空间：离散 {左推, 右推} ｜ 最大步数：500（满分 500）</text>
</svg>
