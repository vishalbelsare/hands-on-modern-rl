<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">DQN 用神经网络近似动作价值函数</title>
  <desc id="desc">状态输入经过 Q 网络，输出每个离散动作的 Q 值，再通过 argmax 选择当前估计价值最高的动作。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="430" fill="#ffffff" />

  <text x="480" y="34" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">用 Q 网络代替 Q 表格</text>
  <text x="480" y="62" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="14" fill="#64748b">一个状态输入，同时得到所有离散动作的价值估计</text>

  <g filter="url(#shadow)">
    <rect x="58" y="142" width="190" height="118" rx="8" fill="#e8f3ff" stroke="#2563eb" stroke-width="1.5" />
  </g>
  <text x="153" y="178" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">状态 s</text>
  <text x="153" y="207" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="15" fill="#334155">LunarLander：8 维向量</text>
  <text x="153" y="232" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="15" fill="#334155">Atari：帧堆叠图像</text>

  <line x1="248" y1="201" x2="326" y2="201" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="287" y="188" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748b">输入</text>

  <g filter="url(#shadow)">
    <rect x="326" y="112" width="244" height="178" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" />
  </g>
  <text x="448" y="144" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Q 网络</text>
  <text x="448" y="171" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="15" fill="#334155">Q(s, ·; θ)</text>

  <g fill="none" stroke="#fb923c" stroke-width="2">
    <circle cx="386" cy="213" r="13" fill="#ffedd5" />
    <circle cx="448" cy="213" r="13" fill="#ffedd5" />
    <circle cx="510" cy="213" r="13" fill="#ffedd5" />
    <line x1="399" y1="213" x2="435" y2="213" />
    <line x1="461" y1="213" x2="497" y2="213" />
  </g>
  <text x="448" y="256" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748b">MLP 或 CNN 提取特征并共享参数</text>

  <line x1="570" y1="201" x2="648" y2="201" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="609" y="188" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748b">一次前向传播</text>

  <g filter="url(#shadow)">
    <rect x="648" y="108" width="240" height="186" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  </g>
  <text x="768" y="140" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">动作价值向量</text>

  <g font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="15" fill="#0f172a">
    <rect x="684" y="162" width="168" height="30" rx="4" fill="#dcfce7" stroke="#86efac" />
    <text x="768" y="183" text-anchor="middle">Q(s, 不喷)</text>
    <rect x="684" y="200" width="168" height="30" rx="4" fill="#ffffff" stroke="#bbf7d0" />
    <text x="768" y="221" text-anchor="middle">Q(s, 左喷)</text>
    <rect x="684" y="238" width="168" height="30" rx="4" fill="#ffffff" stroke="#bbf7d0" />
    <text x="768" y="259" text-anchor="middle">Q(s, 主发动机)</text>
  </g>

  <line x1="768" y1="294" x2="768" y2="340" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)" />
  <text x="792" y="321" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748b">取最大值</text>

  <g filter="url(#shadow)">
    <rect x="662" y="340" width="212" height="50" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.4" />
  </g>
  <text x="768" y="371" text-anchor="middle" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">a = argmaxₐ Q(s, a; θ)</text>

  <path d="M 420 290 C 420 334, 520 356, 662 365" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow)" />
  <text x="456" y="333" font-family="Noto Sans CJK SC, PingFang SC, Arial, sans-serif" font-size="13" fill="#64748b">用于 ε-greedy 策略选择动作</text>
</svg>
