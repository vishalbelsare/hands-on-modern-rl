<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">PPO 核心想法：同一批经验多学几轮，但限制策略变化幅度</title>
  <desc id="desc">流程图展示 PPO 先收集一批旧策略经验，多轮更新时检查新旧策略概率比率，如果变化安全就继续更新，如果变化太大就裁剪。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; }
      .box-blue { fill: #eff6ff; stroke: #2563eb; }
      .box-green { fill: #ecfdf5; stroke: #059669; }
      .box-red { fill: #fef2f2; stroke: #dc2626; }
      .box-amber { fill: #fffbeb; stroke: #d97706; }
      .diamond { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .math { font: 16px "Times New Roman", serif; fill: #1f2937; }
      .arrow { stroke: #4b5563; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="360" fill="#ffffff" />
  <text x="40" y="46" class="title">PPO 的一句话：同一批经验多学几轮，但每轮都限制策略变化幅度</text>

  <rect x="42" y="100" width="170" height="92" class="box box-blue" rx="14" />
  <text x="127" y="132" text-anchor="middle" class="label">收集一批经验</text>
  <text x="127" y="158" text-anchor="middle" class="small">states / actions</text>
  <text x="127" y="180" text-anchor="middle" class="small">rewards / old_logprobs</text>

  <path class="arrow" d="M 214 146 H 286" />

  <rect x="292" y="100" width="166" height="92" class="box box-amber" rx="14" />
  <text x="375" y="132" text-anchor="middle" class="label">多学几轮</text>
  <text x="375" y="158" text-anchor="middle" class="small">同一批数据</text>
  <text x="375" y="180" text-anchor="middle" class="small">mini-batch 更新</text>

  <path class="arrow" d="M 460 146 H 530" />

  <path class="diamond" d="M 610 82 L 718 146 L 610 210 L 502 146 Z" />
  <text x="610" y="130" text-anchor="middle" class="label">检查变化</text>
  <text x="610" y="154" text-anchor="middle" class="math">rₜ = π_new / π_old</text>
  <text x="610" y="178" text-anchor="middle" class="small">是否还在安全区间？</text>

  <path class="arrow" d="M 718 146 H 766" />
  <text x="746" y="128" text-anchor="middle" class="small">安全</text>

  <rect x="772" y="100" width="116" height="92" class="box box-green" rx="14" />
  <text x="830" y="132" text-anchor="middle" class="label">继续更新</text>
  <text x="830" y="158" text-anchor="middle" class="small">让好动作↑</text>
  <text x="830" y="180" text-anchor="middle" class="small">让坏动作↓</text>

  <path class="arrow" d="M 610 210 V 256 H 766" />
  <text x="668" y="242" text-anchor="middle" class="small">变化太大</text>

  <rect x="772" y="226" width="116" height="86" class="box box-red" rx="14" />
  <text x="830" y="258" text-anchor="middle" class="label">裁剪截住</text>
  <text x="830" y="284" text-anchor="middle" class="small">不再奖励</text>
  <text x="830" y="304" text-anchor="middle" class="small">过大变化</text>

  <path class="loop" d="M 830 96 C 830 62, 374 62, 374 96" />
  <text x="604" y="74" text-anchor="middle" class="small">同一批经验可以重复用，但每轮都要重新检查</text>

  <rect x="42" y="244" width="528" height="68" class="box" rx="14" />
  <text x="62" y="274" class="label">代码落点</text>
  <text x="160" y="274" class="math">ratio = exp(new_logprobs - old_logprobs)</text>
  <text x="160" y="298" class="math">policy_loss = -min(ratio × A, clamp(ratio) × A)</text>
</svg>
