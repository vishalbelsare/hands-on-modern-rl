<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">DPO 从 RLHF 和 PPO 中简化出来</title>
  <desc id="desc">图示语言模型强化学习目标、PPO 路径和 DPO 路径之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="960" height="420" fill="#f8fafc" />

  <text x="480" y="42" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#0f172a">
    DPO 不是凭空来的：它从 RLHF / PPO 的同一个目标出发
  </text>

  <g filter="url(#shadow)">
    <rect x="50" y="90" width="260" height="110" rx="12" fill="#ffffff" stroke="#94a3b8" />
    <text x="180" y="122" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">语言模型 RL 目标</text>
    <text x="180" y="152" text-anchor="middle" font-family="monospace" font-size="15" fill="#334155">maximize reward</text>
    <text x="180" y="178" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#475569">同时不要离参考模型太远</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="72" width="230" height="145" rx="12" fill="#fff7ed" stroke="#fb923c" />
    <text x="495" y="105" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#9a3412">PPO / RLHF 路径</text>
    <text x="495" y="136" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#7c2d12">在线采样回答</text>
    <text x="495" y="160" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#7c2d12">Reward Model 打分</text>
    <text x="495" y="184" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#7c2d12">Actor + Critic + Ref + RM</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="72" width="230" height="145" rx="12" fill="#ecfdf5" stroke="#34d399" />
    <text x="795" y="105" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#065f46">DPO 路径</text>
    <text x="795" y="136" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#065f46">使用离线偏好对</text>
    <text x="795" y="160" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#065f46">反解隐式奖励</text>
    <text x="795" y="184" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" fill="#065f46">Policy + Reference</text>
  </g>

  <line x1="310" y1="145" x2="365" y2="145" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />
  <line x1="610" y1="145" x2="665" y2="145" stroke="#334155" stroke-width="2.2" marker-end="url(#arrow)" />

  <path d="M180 210 C180 300, 340 330, 500 330 S800 300, 795 225" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)" />
  <text x="500" y="360" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">
    DPO 保留同一个 KL 约束目标，但把在线 RL 更新变成偏好分类损失
  </text>

  <g>
    <rect x="90" y="250" width="230" height="44" rx="8" fill="#e0f2fe" stroke="#38bdf8" />
    <text x="205" y="278" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" font-weight="700" fill="#075985">状态 = prompt + 已生成 token</text>
  </g>
  <g>
    <rect x="365" y="250" width="230" height="44" rx="8" fill="#fef9c3" stroke="#eab308" />
    <text x="480" y="278" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" font-weight="700" fill="#713f12">动作 = 下一个 token</text>
  </g>
  <g>
    <rect x="640" y="250" width="230" height="44" rx="8" fill="#fae8ff" stroke="#d946ef" />
    <text x="755" y="278" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="14" font-weight="700" fill="#86198f">轨迹 = 一整段回答</text>
  </g>
</svg>
